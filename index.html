html, body { margin: 0; padding: 0; }

function uniqueStrings(items) {
  return [...new Set(items.map((s) => s.replace(/\s+/g, " ").trim()))];
}

function buildPool(specs, targetCount, prefix, level) {
  const raw = [];
  specs.forEach((spec) => {
    spec.a.forEach((a) => {
      spec.b.forEach((b) => {
        spec.c.forEach((c) => {
          raw.push({ text: `${a} ${b} ${c}`, tag: spec.tag });
        });
      });
    });
  });
  return uniqueStrings(raw.map((item) => item.text)).slice(0, targetCount).map((text, index) => ({
    id: `${prefix}${index}`,
    text,
    tag: raw.find((item) => item.text === text)?.tag || specs[0].tag,
    level,
  }));
}

// --- js/utils.js ---
function makeId() {
  if (typeof crypto !== 'undefined' && 'randomUUID' in crypto) return crypto.randomUUID();
  return `id-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
}

function randomItem(items) {
  const item = items[Math.floor(Math.random() * items.length)];
  if (item === undefined) throw new Error('randomItem called with empty array');
  return item;
}

function sampleUnique(items, count) {
  const pool = [...items];
  const picked = [];
  while (pool.length && picked.length < count) {
    const idx = Math.floor(Math.random() * pool.length);
    const [value] = pool.splice(idx, 1);
    if (value !== undefined) picked.push(value);
  }
  return picked;
}

let audioCtx = null;

function getAudioContextCtor() {
  return window.AudioContext || window.webkitAudioContext || null;
}

async function playTurtleScreams() {
  try {
    const AudioCtx = getAudioContextCtor();
    if (!AudioCtx) return;
    if (!audioCtx) audioCtx = new AudioCtx();
    const ctx = audioCtx;
    if (ctx.state === 'suspended') await ctx.resume();
    const now = ctx.currentTime;
    for (let i = 0; i < 5; i += 1) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = i % 2 === 0 ? 'square' : 'sawtooth';
      osc.frequency.setValueAtTime(420 + i * 60, now + i * 0.18);
      osc.frequency.exponentialRampToValueAtTime(900 + i * 40, now + i * 0.26);
      gain.gain.setValueAtTime(0.0001, now + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.055, now + i * 0.20);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.32);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.33);
    }
  } catch {
    // Browser audio lock is acceptable.
  }
}

// --- js/game-logic.js ---

let overlayTimeout = null;

function runSanityChecks() {
  console.assert(INTRO_OPTIONS.length === 3, 'Expected 3 intro options');
  console.assert(CONCLUSION_OPTIONS.length === 3, 'Expected 3 conclusion options');
  console.assert(FABRISTE_FINALS.length === 3, 'Expected 3 Fabrist finals');
  console.assert(DISCREET_POOL.length >= 30, 'Expected at least 30 discreet lines');
  console.assert(REAL_POOL.length >= 40, 'Expected at least 40 real lines');
  console.assert(ALL_REJECTIONS.length === 300, 'Expected exactly 300 rejections');
}

function colorForSkin(index) {
  return ['#f5d7be', '#f0cba9', '#e5b88c', '#d8a074', '#c6895f'][index % 5];
}

function computeArchetype(h, e, f, b) {
  const keys = Object.keys(ARCHETYPES);
  return keys[(h + e * 2 + f + b * 3) % keys.length];
}

function createCharacter(forceFabrist = false) {
  if (forceFabrist) {
    return {
      id: makeId(),
      name: 'FABRISTE',
      isFabrist: true,
      hair: { color: '#b48a68' },
      eyes: { color: '#d0d4de' },
      face: { key: 'carre' },
      body: { key: 'massif' },
      skin: '#c98d67',
      allowedOpener: null,
      preferredConclusion: null,
      likedTags: [...ARCHETYPES.directe.likedTags],
      dislikedTags: [],
      greenFlagIds: new Set(ALL_FLIRT_OPTIONS.map((line) => line.id)),
      redFlagIds: new Set(),
      greenUltimate: null,
      redUltimate: null,
      signature: 'FABRISTE',
    };
  }

  const h = Math.floor(Math.random() * HAIR_OPTIONS.length);
  const e = Math.floor(Math.random() * EYE_OPTIONS.length);
  const f = Math.floor(Math.random() * FACE_OPTIONS.length);
  const b = Math.floor(Math.random() * BODY_OPTIONS.length);
  const hair = HAIR_OPTIONS[h];
  const eyes = EYE_OPTIONS[e];
  const face = FACE_OPTIONS[f];
  const body = BODY_OPTIONS[b];
  const archetypeKey = computeArchetype(h, e, f, b);
  const archetype = ARCHETYPES[archetypeKey];
  const likedCandidates = ALL_FLIRT_OPTIONS.filter((line) => archetype.likedTags.includes(line.tag || ''));
  const dislikedCandidates = ALL_FLIRT_OPTIONS.filter((line) => archetype.dislikedTags.includes(line.tag || ''));
  const neutralCandidates = ALL_FLIRT_OPTIONS.filter((line) => !archetype.likedTags.includes(line.tag || '') && !archetype.dislikedTags.includes(line.tag || ''));
  const greenFlags = sampleUnique([...likedCandidates, ...neutralCandidates], 8);
  const redFlags = sampleUnique([...dislikedCandidates, ...neutralCandidates], 8);
  const greenUltimateCandidates = likedCandidates.filter((line) => line.level === 'real');
  const greenUltimate = randomItem(greenUltimateCandidates.length ? greenUltimateCandidates : REAL_POOL);
  const redUltimate = randomItem(dislikedCandidates.length ? dislikedCandidates : ALL_FLIRT_OPTIONS);

  return {
    id: makeId(),
    name: randomItem(EASTERN_NAMES),
    isFabrist: false,
    hairstyle: randomItem(FEMALE_HAIRSTYLES),
    outfit: randomItem(FEMALE_OUTFITS),
    hair,
    eyes,
    face,
    body,
    skin: colorForSkin(h + e + f),
    allowedOpener: (h + e + f) % 3,
    preferredConclusion: (e + b + f) % 3,
    likedTags: [...archetype.likedTags],
    dislikedTags: [...archetype.dislikedTags],
    greenFlagIds: new Set(greenFlags.filter((line) => line.id !== redUltimate.id).map((line) => line.id)),
    redFlagIds: new Set(redFlags.filter((line) => line.id !== greenUltimate.id).map((line) => line.id)),
    greenUltimate,
    redUltimate,
    signature: `${hair.label} • ${eyes.label} • ${face.label} • ${body.label}`,
  };
}

function npcEmotionFromTone(tone, isFabrist = false) {
  if (isFabrist) return tone === 'unlock' || tone === 'final' ? 'desir' : 'joie';
  if (tone === 'positive') return 'joie';
  if (tone === 'unlock' || tone === 'final' || tone === 'intro') return 'desir';
  if (tone === 'negative') return 'degout';
  return 'tristesse';
}

function playerEmotionFromTone(tone) {
  if (tone === 'negative') return 'tristesse';
  if (tone === 'positive') return 'joie';
  return 'desir';
}

function pickRejectText(harsh = false) {
  return harsh ? randomItem(INSULTING_REJECTIONS) : randomItem(ALL_REJECTIONS);
}

function getReply(pnj, tone) {
  if (pnj.isFabrist) {
    return randomItem([
      'FABRISTE valide tout, avec beaucoup trop d’enthousiasme.',
      'FABRISTE est déjà conquis. Beaucoup trop vite.',
      'FABRISTE approuve, et c’est presque inquiétant.',
    ]);
  }
  const replies = {
    intro: ['Ok, je t’écoute.', 'Bon. T’as réussi à lancer la conversation.', 'Vas-y, voyons ce que t’as.'],
    positive: ['Pas mal.', 'Là, c’est mieux.', 'Ok, continue comme ça.'],
    negative: ['Non, là c’est mauvais.', 'Tu viens de perdre du terrain.', 'Ouais non, pas celle-là.'],
    neutral: ['Je vois l’idée.', 'Mouais. Continue.', 'Je suis pas encore convaincue.'],
    unlock: ['Ok. Là, tu peux tenter un truc.', 'Bon, t’as remonté ton niveau.', 'Vas-y, propose la suite.'],
    final: ['Allez, je t’écoute.', 'Vas-y, joue-la bien.', 'Ne gâche pas tout maintenant.'],
  };
  return randomItem(replies[tone] || ['...']);
}

function makeInitialLog(pnj) {
  return [
    { speaker: 'system', text: pnj.isFabrist ? 'Score en vrille : FABRISTE débarque.' : `${pnj.name} entre dans ton champ de vision.` },
    { speaker: pnj.name, text: pnj.isFabrist ? 'FABRISTE te mate avec un enthousiasme très inquiétant.' : 'Elle te regarde. À toi d’ouvrir.' },
  ];
}

function addLog(speaker, text) {
  state.log = [...state.log, { speaker, text }].slice(-14);
}

function rememberBestiary(pnj) {
  if (pnj.isFabrist) return;
  const existing = state.bestiary.find((e) => e.signature === pnj.signature);
  if (existing) {
    existing.wins += 1;
  } else {
    state.bestiary.unshift({ signature: pnj.signature, likedTags: [...pnj.likedTags], dislikedTags: [...pnj.dislikedTags], wins: 1 });
  }
}

function recordHistory(pnj, outcome, delta, finalScore) {
  state.history.unshift({ id: makeId(), name: pnj.name, signature: pnj.signature, outcome, delta, finalScore });
  state.history = state.history.slice(0, 18);
}

function setupEncounter(nextScore = state.score) {
  const next = createCharacter(nextScore <= -3);
  patchState({
    current: next,
    stage: 'opening',
    greens: 0,
    reds: 0,
    discreetTurns: 0,
    choices: [...INTRO_OPTIONS],
    log: makeInitialLog(next),
    status: 'active',
    playerEmotion: 'desir',
    npcEmotion: next.isFabrist ? 'joie' : 'tristesse',
    overlay: false,
  });
  renderAll();
}

function loseEncounter(reason, harsh = false, npcMood = null) {
  state.score -= 1;
  state.status = 'lost';
  state.playerEmotion = 'tristesse';
  state.npcEmotion = npcMood || (harsh ? 'colere' : 'degout');
  addLog(state.current.name, reason || pickRejectText(harsh));
  addLog('system', 'Raté. -1 point.');
  recordHistory(state.current, 'échec', -1, state.score);
  renderAll();
}

async function winEncounter() {
  state.score += 2;
  state.status = 'won';
  state.playerEmotion = 'joie';
  state.npcEmotion = state.current.isFabrist ? 'joie' : 'desir';
  addLog(state.current.name, state.current.isFabrist ? 'FABRISTE valide tout, dans un mélange de désir et de chaos.' : 'Ok. Cette fois, elle vient avec toi.');
  addLog('system', '+2 points, bien joué.');
  recordHistory(state.current, 'conclusion', 2, state.score);
  rememberBestiary(state.current);
  state.overlay = true;
  renderAll();
  await playTurtleScreams();
  if (overlayTimeout) window.clearTimeout(overlayTimeout);
  overlayTimeout = window.setTimeout(() => {
    state.overlay = false;
    renderAll();
  }, 2600);
}

function evaluateFlirt(choice) {
  if (state.current.isFabrist) {
    const nextGreens = state.greens + 1;
    state.greens = nextGreens;
    state.playerEmotion = nextGreens >= 3 ? 'joie' : 'desir';
    state.npcEmotion = nextGreens >= 3 ? 'desir' : 'joie';
    addLog(state.current.name, getReply(state.current, nextGreens >= 3 ? 'unlock' : 'positive'));
    if (nextGreens >= 3) {
      state.stage = 'conclusion';
      state.choices = [...FABRISTE_FINALS];
      renderAll();
      return;
    }
    if (state.stage === 'discreet') {
      const nextTurns = state.discreetTurns + 1;
      state.discreetTurns = nextTurns;
      if (nextTurns >= 2) {
        state.stage = 'real';
        state.choices = sampleUnique(REAL_POOL, 3);
      } else {
        state.choices = sampleUnique(DISCREET_POOL, 3);
      }
    } else {
      state.choices = state.stage === 'real' ? sampleUnique(REAL_POOL, 3) : sampleUnique(DISCREET_POOL, 3);
    }
    renderAll();
    return;
  }

  if (state.current.redUltimate && choice.id === state.current.redUltimate.id) {
    loseEncounter(pickRejectText(true), true);
    return;
  }

  let deltaGreen = 0;
  let deltaRed = 0;
  let tone = 'neutral';
  let unlockConclusion = false;

  if (state.current.greenUltimate && choice.id === state.current.greenUltimate.id) {
    deltaGreen = 2;
    tone = 'unlock';
    unlockConclusion = true;
  } else if (state.current.greenFlagIds.has(choice.id) || state.current.likedTags.includes(choice.tag || '')) {
    deltaGreen = 1;
    tone = 'positive';
  } else if (state.current.redFlagIds.has(choice.id) || state.current.dislikedTags.includes(choice.tag || '')) {
    deltaRed = 1;
    tone = 'negative';
  }

  const nextGreens = state.greens + deltaGreen;
  const nextReds = state.reds + deltaRed;
  state.greens = nextGreens;
  state.reds = nextReds;
  state.playerEmotion = playerEmotionFromTone(unlockConclusion ? 'unlock' : tone);
  state.npcEmotion = npcEmotionFromTone(unlockConclusion ? 'unlock' : tone, state.current.isFabrist);
  addLog(state.current.name, getReply(state.current, unlockConclusion ? 'unlock' : tone));

  if (nextReds - nextGreens >= 6) {
    loseEncounter(pickRejectText(deltaRed > 0), deltaRed > 0);
    return;
  }

  if (unlockConclusion || nextGreens >= 3) {
    state.stage = 'conclusion';
    state.choices = [...CONCLUSION_OPTIONS];
    addLog(state.current.name, getReply(state.current, 'final'));
    renderAll();
    return;
  }

  if (state.stage === 'discreet') {
    const nextTurns = state.discreetTurns + 1;
    state.discreetTurns = nextTurns;
    if (nextTurns >= 2) {
      state.stage = 'real';
      state.choices = sampleUnique(REAL_POOL, 3);
    } else {
      state.choices = sampleUnique(DISCREET_POOL, 3);
    }
    renderAll();
    return;
  }

  state.choices = sampleUnique(REAL_POOL, 3);
  renderAll();
}

async function chooseOption(choiceId) {
  if (state.status !== 'active') return;
  const choice = state.choices.find((item) => item.id === choiceId);
  if (!choice) return;

  addLog('Guy-Mauve', choice.text);

  if (state.stage === 'opening') {
    const goodOpening = state.current.isFabrist || choice.id === `o${state.current.allowedOpener}`;
    if (!goodOpening) {
      loseEncounter(pickRejectText(true), true, 'colere');
      return;
    }
    state.playerEmotion = 'desir';
    state.npcEmotion = state.current.isFabrist ? 'joie' : 'desir';
    addLog(state.current.name, getReply(state.current, 'intro'));
    state.stage = 'discreet';
    state.choices = sampleUnique(DISCREET_POOL, 3);
    renderAll();
    return;
  }

  if (state.stage === 'conclusion') {
    if (state.current.isFabrist) {
      await winEncounter();
      return;
    }
    if (choice.id === `c${state.current.preferredConclusion}`) {
      await winEncounter();
      return;
    }
    const diff = state.reds - state.greens;
    if (diff >= 2) {
      loseEncounter(pickRejectText(true), true, 'degout');
      return;
    }
    const nextReds = state.reds + 1;
    state.reds = nextReds;
    state.playerEmotion = 'tristesse';
    state.npcEmotion = 'degout';
    addLog(state.current.name, 'Pas encore. Reviens avec quelque chose de mieux si tu veux me faire bouger.');
    if (nextReds - state.greens >= 6) {
      loseEncounter(pickRejectText(true), true);
      return;
    }
    state.stage = 'real';
    state.choices = sampleUnique(REAL_POOL, 3);
    renderAll();
    return;
  }

  evaluateFlirt(choice);
}



// --- js/ui-render.js ---

const headerEl = document.getElementById('header');
const portraitsEl = document.getElementById('portraits');
const logEl = document.getElementById('log');
const choicesEl = document.getElementById('choices');
const phaseBarEl = document.getElementById('phase-bar');
const drawerRootEl = document.getElementById('drawer-root');
const overlayRootEl = document.getElementById('overlay-root');

const player = {
  name: 'Guy-Mauve',
  id: 'guy',
  isFabrist: false,
  face: { key: 'ovale' },
  body: { key: 'compacte' },
  skin: '#e2b28a',
  hair: { key: 'brun-nuit', color: '#4a2b20' },
  eyes: { color: '#8fa6c8' },
  allowedOpener: null,
  preferredConclusion: null,
  likedTags: [],
  dislikedTags: [],
  greenFlagIds: new Set(),
  redFlagIds: new Set(),
  greenUltimate: null,
  redUltimate: null,
  signature: 'Guy-Mauve',
};

function renderHeader() {
  headerEl.innerHTML = `
    <div class="topbar">
      <div>
        <div class="eyebrow">soirée parisienne</div>
        <h1>Guy-Mauve tente sa chance</h1>
      </div>
      <div class="topbar-actions">
        <div class="badge badge-gold"><span>Score</span><strong>${state.score}</strong></div>
        <button data-action="open-history">Archives</button>
        <button data-action="open-bestiary">Bestiaire</button>
      </div>
    </div>
  `;
}

function renderPortraits() {
  portraitsEl.innerHTML = `
    <div class="portrait-card">${renderPortrait(player, state.playerEmotion, true)}</div>
    <div class="portrait-card">${renderPortrait(state.current, state.npcEmotion, false)}</div>
  `;
}

function renderPhaseBar() {
  const labels = {
    opening: '1 · première approche',
    discreet: '2 · léger flirt',
    real: '3 · ça chauffe',
    conclusion: '4 · proposition',
  };
  phaseBarEl.innerHTML = `
    <div>
      <div class="eyebrow">moment</div>
      <div class="phase-title">${labels[state.stage]}</div>
    </div>
    <button data-action="restart">${state.status === 'active' ? 'Recommencer' : state.score <= -3 ? 'FABRISTE' : 'Nouvelle rencontre'}</button>
  `;
}

function renderLog() {
  logEl.innerHTML = state.log.map((entry) => {
    const cls = entry.speaker === 'Guy-Mauve' ? 'bubble bubble-player' : entry.speaker === 'system' ? 'bubble bubble-system' : 'bubble bubble-npc';
    return `<div class="${cls}"><span class="speaker">${entry.speaker}</span><div>${entry.text}</div></div>`;
  }).join('');
  logEl.scrollTop = logEl.scrollHeight;
}

function renderChoices() {
  choicesEl.innerHTML = state.choices.map((choice) => `<button class="choice-btn" data-choice-id="${choice.id}" ${state.status !== 'active' ? 'disabled' : ''}>${choice.text}</button>`).join('');
}

function renderDrawer() {
  if (!state.drawer) {
    drawerRootEl.innerHTML = '';
    return;
  }
  const isBestiary = state.drawer === 'bestiary';
  const items = isBestiary ? state.bestiary : state.history;
  drawerRootEl.innerHTML = `
    <div class="drawer-backdrop" data-action="close-drawer">
      <div class="drawer-panel" onclick="event.stopPropagation()">
        <div class="drawer-header">
          <h2>${isBestiary ? 'Carnet' : 'Archives'}</h2>
          <button data-action="close-drawer">Fermer</button>
        </div>
        <div class="drawer-content">
          ${items.length === 0 ? `<div class="empty-box">${isBestiary ? 'Le carnet se remplit seulement après une vraie conclusion.' : 'Aucune rencontre gardée en mémoire.'}</div>` : isBestiary ? items.map((entry) => `<div class="drawer-item"><div class="item-title">${entry.signature}</div><div><span class="ok">Aime :</span> ${entry.likedTags.join(', ')}</div><div><span class="ko">Supporte pas :</span> ${entry.dislikedTags.join(', ')}</div></div>`).join('') : items.map((item) => `<div class="drawer-item"><div class="row-between"><div class="item-title">${item.name}</div><div class="${item.delta > 0 ? 'ok' : 'ko'}">${item.delta > 0 ? `+${item.delta}` : item.delta}</div></div><div class="muted">${item.signature}</div></div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderOverlay() {
  overlayRootEl.innerHTML = state.overlay ? `<div class="overlay-backdrop"><div class="overlay-card"><div class="overlay-shape shape-a"></div><div class="overlay-shape shape-b"></div><div class="overlay-shape shape-c"></div><div class="overlay-title">FIN DE SOIRÉE FLOUTÉE</div></div></div>` : '';
}

function renderAll() {
  renderHeader();
  renderPortraits();
  renderPhaseBar();
  renderLog();
  renderChoices();
  renderDrawer();
  renderOverlay();
}

function openDrawer(kind) {
  patchState({ drawer: kind });
  renderAll();
}

function closeDrawer() {
  patchState({ drawer: null });
  renderAll();
}



// --- js/app.js ---

runSanityChecks();

document.addEventListener('click', async (event) => {
  const target = event.target.closest('[data-action], [data-choice-id]');
  if (!target) return;
  const action = target.dataset.action;
  const choiceId = target.dataset.choiceId;

  if (choiceId) {
    await chooseOption(choiceId);
    return;
  }
  if (action === 'open-history') {
    openDrawer('history');
    return;
  }
  if (action === 'open-bestiary') {
    openDrawer('bestiary');
    return;
  }
  if (action === 'close-drawer') {
    closeDrawer();
    return;
  }
  if (action === 'restart') {
    setupEncounter(state.score);
    return;
  }
});

setupEncounter();
renderAll();


  </script>
